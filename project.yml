name: Comida
options:
  bundleIdPrefix: com.mariana.comida
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Comida:
    type: application
    platform: iOS
    sources:
      - path: Comida
    info:
      path: Comida/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Comida
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: Comida/Comida.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.mariana.comida
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-environment: Production
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mariana.comida.Comida
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

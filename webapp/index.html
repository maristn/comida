<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#f6f8f4" />
  <title>Food</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-main">
    <section id="shopping-page" class="page active">
      <div class="list-section">
        <h2>To Buy</h2>
        <form id="add-form" class="add-inline">
          <input id="new-item-input" type="text" placeholder="Ex: 2 ovos, 500g farinha..." autocomplete="off" />
          <button type="submit" class="add-button add-button--small" aria-label="Add">+</button>
        </form>
        <ul id="to-buy-list" class="item-grid"></ul>
        <p id="to-buy-empty" class="empty-state">Nothing to buy</p>
      </div>

      <div class="list-section">
        <h2>Pantry</h2>
        <form id="add-pantry-form" class="add-inline">
          <input id="new-pantry-input" type="text" placeholder="Ex: 1kg arroz, 200ml azeite..." autocomplete="off" />
          <button type="submit" class="add-button add-button--small" aria-label="Add to pantry">+</button>
        </form>
        <ul id="pantry-list" class="item-grid"></ul>
        <p id="pantry-empty" class="empty-state">Pantry is empty</p>
      </div>
    </section>

    <section id="recipes-page" class="page">
      <div class="list-section">
        <h2>New Recipe</h2>
        <form id="add-recipe-form" class="recipe-form">
          <input id="recipe-name-input" type="text" placeholder="Recipe name" autocomplete="off" />
          <textarea id="recipe-ingredients-input" placeholder="Ingredients, one per line" rows="4"></textarea>
          <textarea id="recipe-instructions-input" placeholder="Instructions (optional)" rows="4"></textarea>
          <button type="submit" class="recipe-save-button">Save Recipe</button>
        </form>
      </div>

      <div class="list-section">
        <h2>Recipe Ideas</h2>
        <div id="gemini-key-form" class="gemini-key-form" style="display:none">
          <input id="gemini-key-input" type="text" placeholder="Paste Gemini API key..." autocomplete="off" />
          <button id="gemini-key-save" class="recipe-save-button">Save</button>
        </div>
        <input id="suggest-query" type="text" placeholder="breakfast, soup, dessert..." autocomplete="off" style="margin-bottom:8px" />
        <button id="suggest-btn" class="suggest-button">✨ Suggest from pantry</button>
        <div id="suggest-result" class="suggest-result"></div>
      </div>

      <div class="list-section">
        <h2>Recipes</h2>
        <ul id="recipes-list" class="item-list recipe-list"></ul>
        <p id="recipes-empty" class="empty-state">No recipes yet</p>
      </div>
    </section>
  </main>

  <nav class="tab-bar">
    <button type="button" class="tab-button active" data-tab="shopping">
      <span class="tab-icon">🛒</span>
      List
    </button>
    <button type="button" class="tab-button" data-tab="recipes">
      <span class="tab-icon">🍳</span>
      Recipes
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
